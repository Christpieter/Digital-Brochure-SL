<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Summarecon Learning — Perfect Vertical 3D Brochure</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --orange: #F07B1D;
        --green: #3B9C6E;
        --pw: 460px; /* Lebar Panel Landscape */
        --ph: 280px; /* Tinggi Panel */
    }

    html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #2a364f 0%, #0d1117 80%);
        font-family: 'Poppins', sans-serif;
        touch-action: none; user-select: none; -webkit-user-select: none;
    }

    /* Cahaya Latar */
    .glow { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; pointer-events: none; z-index: 0; }
    .glow.g1 { width: 400px; height: 400px; background: var(--orange); top: -10%; left: -10%; }
    .glow.g2 { width: 500px; height: 500px; background: var(--green); bottom: -20%; right: -10%; }

    /* ── SCENE 3D ── */
    #scene {
        width: 100vw; height: 100vh; perspective: 1800px;
        display: flex; align-items: center; justify-content: center;
        cursor: grab; position: relative; z-index: 10;
        touch-action: none; 
    }
    #scene.dragging { cursor: grabbing; }

    #world {
        width: 0; height: 0; transform-style: preserve-3d; will-change: transform;
        transform: rotateX(-15deg) rotateY(15deg) scale(0.85);
    }

    #brochure {
        position: absolute;
        width: var(--pw); 
        height: calc(var(--ph) * 3);
        transform-style: preserve-3d;
        left: calc(var(--pw) * -0.5);
        top: calc(var(--ph) * -1.5);
    }

    .panel {
        position: absolute;
        width: var(--pw); height: var(--ph);
        left: 0; transform-style: preserve-3d;
    }

    #pTop, #pBot { cursor: pointer; }
    #pC { cursor: default; }

    #pTop { top: 0; transform-origin: bottom center; transition: transform 0.85s cubic-bezier(0.64, 0.04, 0.35, 1); z-index: 3; }
    #pC   { top: var(--ph); z-index: 1; }
    #pBot { top: calc(var(--ph) * 2); transform-origin: top center; transition: transform 0.8s cubic-bezier(0.64, 0.04, 0.35, 1); z-index: 2; }

    #pTop.closed { transform: rotateX(-140deg); } 
    #pBot.closed { transform: rotateX(179.9deg); }  

    .face {
        position: absolute; inset: 0;
        backface-visibility: hidden; -webkit-backface-visibility: hidden;
        background-color: #fff; background-size: 100% 100%;
        background-position: center; background-repeat: no-repeat;
        border: 1px solid rgba(0,0,0,0.15); 
        transform: translateZ(1px); 
    }
    
    .face-back { 
        transform: rotateX(180deg) translateZ(1px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
    }

    .crease-bot { position: absolute; bottom: 0; left: 0; right: 0; height: 35px; background: linear-gradient(to top, rgba(0,0,0,0.25), transparent); pointer-events: none; z-index: 50; }
    .crease-top { position: absolute; top: 0; left: 0; right: 0; height: 35px; background: linear-gradient(to bottom, rgba(0,0,0,0.25), transparent); pointer-events: none; z-index: 50; }

    /* =========================================
       TATA LETAK UI & TOMBOL KONTROL
       ========================================= */
    #ui-controls {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        z-index: 1000; pointer-events: none; width: 100%;
    }
    .nav-btn {
        pointer-events: auto; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(10px); color: #fff; font-family: 'Poppins'; font-weight: 600; font-size: 14px;
        padding: 12px 26px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }
    .nav-btn.flat-active { background: var(--green); border-color: var(--green); }
    .hint-text { font-size: 11px; color: rgba(255,255,255,0.8); letter-spacing: 1px; text-transform: uppercase; background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px; }

    #reset-btn { 
        position: fixed; top: 25px; right: 25px; pointer-events: auto; 
        background: transparent; border: 1px solid rgba(255,255,255,0.4); color: #fff; 
        padding: 8px 16px; border-radius: 20px; cursor: pointer; font-family: 'Poppins'; font-size: 12px; transition: 0.2s; z-index: 1000; 
    }
    #reset-btn:hover { background: rgba(255,255,255,0.2); }

    #page-nav { 
        position: fixed; right: 25px; top: 50%; transform: translateY(-50%); 
        display: none; flex-direction: column; gap: 15px; z-index: 1000; 
    }
    .page-btn {
        background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.5);
        color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .page-btn:hover { background: var(--orange); border-color: var(--orange); transform: scale(1.1); }
    .page-btn:active { transform: scale(0.95); }

    /* =========================================
       FITUR BARU: NAVIGASI PANDUAN (GUIDED TOUR)
       ========================================= */
    .guide-box {
        position: absolute;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none; /* Tidak menghalangi klik ke panel */
        z-index: 1500;
    }
    .guide-box.active { display: flex; }
    
    .guide-dot {
        width: 36px; height: 36px;
        background: rgba(240, 123, 29, 0.2);
        border: 2px solid var(--orange);
        border-radius: 50%;
        position: relative;
        animation: pulseRing 1.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    .guide-dot::after {
        content: ''; position: absolute; top: 50%; left: 50%;
        width: 12px; height: 12px; background: var(--orange);
        border-radius: 50%; transform: translate(-50%, -50%);
        box-shadow: 0 0 10px var(--orange);
    }

    .guide-text {
        margin-top: 12px; background: rgba(0,0,0,0.85); color: #fff;
        padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
        border: 1px solid rgba(240, 123, 29, 0.5); text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        backdrop-filter: blur(4px);
        animation: floatUpDown 2s ease-in-out infinite;
        white-space: nowrap;
    }

    /* Penempatan Spesifik Panduan */
    /* Guide 1 & 2 berada di dalam ruang 3D, jadi posisinya persentase dari panel */
    #guide-1 { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #guide-2 { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    
    /* Guide 3 & 4 berada di ruang UI (Layar Datar 2D) */
    #guide-3 { bottom: 90px; left: 50%; transform: translateX(-50%); position: fixed; }
    
    #guide-4 { top: 50%; right: 80px; transform: translateY(-50%); position: fixed; flex-direction: row; }
    #guide-4 .guide-text { margin-top: 0; margin-right: 15px; }

    @keyframes pulseRing { 
        0% { box-shadow: 0 0 0 0 rgba(240, 123, 29, 0.6); } 
        70% { box-shadow: 0 0 0 20px rgba(240, 123, 29, 0); } 
        100% { box-shadow: 0 0 0 0 rgba(240, 123, 29, 0); } 
    }
    @keyframes floatUpDown { 
        0%, 100% { transform: translateY(0); } 
        50% { transform: translateY(-8px); } 
    }

    @media (max-width: 600px) {
        .nav-btn { padding: 10px 22px; font-size: 12px; }
        #ui-controls { bottom: 20px; gap: 8px; }
        #reset-btn { top: 15px; right: 15px; font-size: 10px; padding: 6px 12px; }
        #page-nav { right: 10px; gap: 10px; }
        .page-btn { width: 42px; height: 42px; font-size: 16px; }
        .hint-text { font-size: 9px; padding: 5px 12px; }

        /* Responsif Panduan */
        .guide-text { font-size: 11px; padding: 6px 12px; }
        .guide-dot { width: 30px; height: 30px; }
        .guide-dot::after { width: 10px; height: 10px; }
        #guide-3 { bottom: 75px; }
        #guide-4 { right: 65px; }
        #guide-4 .guide-text { margin-right: 10px; }
    }
</style>
</head>
<body>

    <div class="glow g1"></div>
    <div class="glow g2"></div>

    <button id="reset-btn" onclick="resetView()">↺ Reset View</button>

    <div id="ui-controls">
        <button class="nav-btn" id="btn-flat" onclick="toggleFlatView()">🔍 Mode Datar</button>
        <div class="hint-text">👆 Klik panel buka/lipat • Drag memutar • Cubit Zoom</div>
    </div>

    <!-- UI Panduan 3 & 4 (2D Screen Space) -->
    <div class="guide-box" id="guide-3">
        <div class="guide-text" style="margin-top:0; margin-bottom:12px;">Klik Untuk Masuk ke Mode Datar</div>
        <div class="guide-dot"></div>
    </div>
    <div class="guide-box" id="guide-4">
        <div class="guide-text">Gunakan ini untuk<br>berpindah halaman</div>
        <div class="guide-dot"></div>
    </div>

    <div id="page-nav">
        <button class="page-btn" id="btn-up" onclick="navPage(-1)">▲</button>
        <button class="page-btn" id="btn-down" onclick="navPage(1)">▼</button>
    </div>

    <div id="scene">
        <div id="world">
            <div id="brochure">
                
                <div class="panel closed" id="pTop">
                    <div class="face" style="background-color: #f4f4f4; background-image: url('./asset/isi1.png');">
                        <div class="crease-bot"></div>
                    </div>
                    <div class="face face-back" style="background-color: #e5e5e5; background-image: url('asset/atas.png');">
                        <!-- UI Panduan 1 (Nempel di 3D Backface Atas) -->
                        <div class="guide-box" id="guide-1">
                            <div class="guide-dot"></div>
                            <div class="guide-text">Klik disini untuk buka<br>bagian atas</div>
                        </div>
                    </div>
                </div>

                <div class="panel" id="pC">
                    <div class="face" style="background-color: #ffffff; background-image: url('asset/isi3.png');"></div>
                    <div class="face face-back" style="background-color: #e5e5e5; background-image: url('asset/belakang.png');"></div>
                </div>

                <div class="panel closed" id="pBot">
                    <div class="face" style="background-color: #f4f4f4; background-image: url('asset/isi2.png');">
                        <div class="crease-top"></div>
                    </div>
                    <div class="face face-back" style="background-color: #e5e5e5; background-image: url('asset/keyboard.png');">
                        <!-- UI Panduan 2 (Nempel di 3D Backface Bawah) -->
                        <div class="guide-box" id="guide-2">
                            <div class="guide-dot"></div>
                            <div class="guide-text">Klik disini untuk buka<br>bagian bawah</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

<script>
    const scene = document.getElementById('scene');
    const world = document.getElementById('world');
    const pTop = document.getElementById('pTop');
    const pBot = document.getElementById('pBot');
    const btnFlat = document.getElementById('btn-flat');
    const pageNav = document.getElementById('page-nav');
    const btnUp = document.getElementById('btn-up');
    const btnDown = document.getElementById('btn-down');

    // Variabel Layar Utama
    let flatState = 0; 
    let currentPage = 1; 
    let rotX = -15, rotY = 15, panY = 0;
    
    function getInitialScale() {
        if (window.innerWidth < 500) return window.innerWidth / 520;
        return 0.85;
    }
    let scale = getInitialScale();

    // Variabel Deteksi Sentuh
    const pointers = {}; 
    let isDragging = false; 
    let hasMoved = false; 
    let startX = 0, startY = 0, lastTime = 0;
    let vX = 0, vY = 0;
    let clickTargetPanel = null; 
    let initialPinchDist = -1;
    let initialScale = 1;
    let animationFrame = null;

    const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

    function applyTransform() {
        world.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${scale}) translateY(${panY}px)`;
    }
    applyTransform();

    // ==========================================
    // LOGIKA FITUR PANDUAN (GUIDE SYSTEM)
    // ==========================================
    let currentGuideStep = 1;

    function updateGuide() {
        // Hentikan jika panduan sudah selesai (Step > 4)
        if (currentGuideStep > 4) {
            document.querySelectorAll('.guide-box').forEach(el => el.classList.remove('active'));
            return;
        }

        // Sembunyikan semua terlebih dahulu
        document.querySelectorAll('.guide-box').forEach(el => el.classList.remove('active'));

        if (currentGuideStep === 1) {
            // Jika pengguna sudah buka atas duluan tanpa disuruh
            if (!pTop.classList.contains('closed')) {
                currentGuideStep = 2; updateGuide();
            } else {
                document.getElementById('guide-1').classList.add('active');
            }
        } 
        else if (currentGuideStep === 2) {
            // Jika pengguna sudah buka bawah
            if (!pBot.classList.contains('closed')) {
                currentGuideStep = 3; 
                setTimeout(updateGuide, 850); // Jeda agar animasi panel selesai
            } else {
                document.getElementById('guide-2').classList.add('active');
            }
        }
        else if (currentGuideStep === 3) {
            if (flatState !== 0) {
                currentGuideStep = 4; 
                setTimeout(updateGuide, 850); // Jeda agar kamera muter
            } else {
                document.getElementById('guide-3').classList.add('active');
            }
        }
        else if (currentGuideStep === 4) {
            // Muncul hanya jika ada di mode datar
            if (flatState === 1) {
                document.getElementById('guide-4').classList.add('active');
            }
        }
    }
    // Mulai panduan saat web diload
    updateGuide();

    // ==========================================

    function handlePanelClick(panel) {
        if (!panel || panel.id === 'pC') return; 
        if (flatState !== 0) resetFlatModeUI();

        if (panel.id === 'pBot' && pTop.classList.contains('closed')) {
            pTop.classList.remove('closed'); 
        } else {
            panel.classList.toggle('closed');
        }

        let targetRotX = pTop.classList.contains('closed') ? -20 : -5;
        targetRotation(targetRotX, rotY, scale, 0);

        // Update Panduan setelah klik
        updateGuide();
    }

    function toggleFlatView() {
        let targetScale = Math.min(window.innerWidth / 480, window.innerHeight / 300); 
        targetScale = clamp(targetScale, 0.4, 2.0); 

        if (flatState === 0) {
            pTop.classList.remove('closed');
            pBot.classList.remove('closed');
            
            currentPage = 1; 
            flatState = 1;
            btnFlat.textContent = '🔍 Sisi Luar Datar';
            btnFlat.classList.add('flat-active');
            pageNav.style.display = 'flex';
        } else if (flatState === 1) {
            currentPage = 1; 
            flatState = 2;
            btnFlat.textContent = 'Kembali ke 3D';
        } else {
            resetFlatModeUI();
            targetRotation(-15, 15, getInitialScale(), 0);
            updateGuide();
            return;
        }

        let targetPanY = calculatePanY(currentPage, flatState);
        targetRotation(flatState === 1 ? 0 : 180, 0, targetScale, targetPanY);
        updatePageNavUI();

        // Update Panduan setelah klik tombol
        updateGuide();
    }

    function navPage(dir) {
        // Hilangkan panduan terakhir selamanya jika user klik up/down
        if (currentGuideStep === 4) {
            currentGuideStep = 5; 
            updateGuide();
        }

        currentPage = clamp(currentPage + dir, 0, 2);
        
        let targetPanY = calculatePanY(currentPage, flatState);
        let targetScale = Math.min(window.innerWidth / 480, window.innerHeight / 300);
        targetScale = clamp(targetScale, 0.4, 2.0);

        targetRotation(flatState === 1 ? 0 : 180, 0, targetScale, targetPanY);
        updatePageNavUI();
    }

    function calculatePanY(vIndex, state) {
        if (state === 1) { return 280 * (1 - vIndex); } 
        else if (state === 2) { return 280 * (vIndex - 1); }
        return 0;
    }

    function updatePageNavUI() {
        let isTop = currentPage === 0;
        let isBot = currentPage === 2;
        
        btnUp.style.opacity = isTop ? '0.3' : '1';
        btnUp.style.pointerEvents = isTop ? 'none' : 'auto';
        
        btnDown.style.opacity = isBot ? '0.3' : '1';
        btnDown.style.pointerEvents = isBot ? 'none' : 'auto';
    }

    function resetFlatModeUI() {
        flatState = 0;
        btnFlat.textContent = '🔍 Mode Datar';
        btnFlat.classList.remove('flat-active');
        pageNav.style.display = 'none';
        
        if(panY !== 0) {
            let sPan = panY;
            let sTime = performance.now();
            function resetPanAnim() {
                let p = Math.min((performance.now() - sTime) / 300, 1);
                panY = sPan * (1 - p);
                applyTransform();
                if(p < 1 && isDragging) requestAnimationFrame(resetPanAnim);
            }
            requestAnimationFrame(resetPanAnim);
        }
    }

    function targetRotation(targetX, targetY, targetScale, targetPanY) {
        cancelAnimationFrame(animationFrame);
        let sX = rotX, sY = rotY, sScale = scale, sPanY = panY;
        let sTime = performance.now();
        function animate(time) {
            let progress = Math.min((time - sTime) / 600, 1);
            let ease = 1 - Math.pow(1 - progress, 3);
            rotX = sX + (targetX - sX) * ease;
            rotY = sY + (targetY - sY) * ease;
            scale = sScale + (targetScale - sScale) * ease;
            panY = sPanY + (targetPanY - sPanY) * ease;
            applyTransform();
            if (progress < 1) requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    }

 /* DETEKSI SENTUH PINTAR */
 scene.addEventListener('pointerdown', (e) => {
        if(e.target.closest('#ui-controls') || e.target.closest('#page-nav') || e.target.closest('#reset-btn')) return;
        
        pointers[e.pointerId] = e;
        
        if (Object.keys(pointers).length === 1) {
            isDragging = true;
            hasMoved = false; 
            clickTargetPanel = e.target.closest('.panel');
            
            startX = e.clientX; startY = e.clientY;
            lastTime = performance.now();
            vX = 0; vY = 0;
            
            cancelAnimationFrame(animationFrame);
            scene.setPointerCapture(e.pointerId); 
        } 
        else if (Object.keys(pointers).length === 2) {
            isDragging = false; 
            let pts = Object.values(pointers);
            initialPinchDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
            initialScale = scale;
            // PERUBAHAN: Dihapus agar saat dicubit (pinch zoom), mode datar tidak tertutup
            // if(flatState !== 0) resetFlatModeUI(); 
        }
    });

    scene.addEventListener('pointermove', (e) => {
        if (!pointers[e.pointerId]) return;
        pointers[e.pointerId] = e; 

        let activePointers = Object.values(pointers);

        if (activePointers.length === 2) {
            let dist = Math.hypot(activePointers[0].clientX - activePointers[1].clientX, activePointers[0].clientY - activePointers[1].clientY);
            if (initialPinchDist > 0) {
                scale = clamp(initialScale * (dist / initialPinchDist), 0.3, 3.0);
                applyTransform();
            }
            return;
        }

        if (isDragging && activePointers.length === 1) {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            if (Math.hypot(dx, dy) > 8) hasMoved = true;

            if (hasMoved) {
                const dt = Math.max(performance.now() - lastTime, 1);
                vY = (dx / dt) * 12; 
                vX = -(dy / dt) * 12;
                
                // PERUBAHAN: Hanya izinkan memutar 3D jika sedang TIDAK di mode datar
                if (flatState === 0) {
                    rotY += dx * 0.4; 
                    rotX = clamp(rotX - dy * 0.4, -80, 260);
                }
                
                startX = e.clientX; startY = e.clientY; 
                lastTime = performance.now();
                applyTransform();
            }
        }
    });

    function handlePointerEnd(e) {
        delete pointers[e.pointerId]; 

        if (Object.keys(pointers).length < 2) initialPinchDist = -1;

        if (isDragging) {
            isDragging = false;
            scene.releasePointerCapture(e.pointerId);
            
            if (!hasMoved && clickTargetPanel) {
                handlePanelClick(clickTargetPanel);
            } else if (hasMoved) {
                applyInertia();
            }
        }
    }

    scene.addEventListener('pointerup', handlePointerEnd);
    scene.addEventListener('pointercancel', handlePointerEnd);

    function applyInertia() {
        cancelAnimationFrame(animationFrame);
        function tick() {
            if (Math.abs(vX) < 0.05 && Math.abs(vY) < 0.05) return;
            
            // PERUBAHAN: Inertia memutar hanya jalan jika tidak di mode datar
            if (flatState === 0) {
                rotX = clamp(rotX + vX, -80, 260); 
                rotY += vY;
            }
            
            vX *= 0.92; vY *= 0.92;
            applyTransform();
            animationFrame = requestAnimationFrame(tick);
        }
        tick();
    }

    scene.addEventListener('wheel', (e) => {
        e.preventDefault();
        scale = clamp(scale - e.deltaY * 0.001, 0.3, 2.5);
        applyTransform();
        // PERUBAHAN: Dihapus agar scroll/zoom tidak menutup mode datar otomatis
        // if(flatState !== 0) resetFlatModeUI();
    }, { passive: false });

    window.addEventListener('resize', () => {
        if(flatState === 0 && !isDragging) {
            targetRotation(rotX, rotY, getInitialScale(), 0);
        }
    });

    function resetView() {
        resetFlatModeUI();
        targetRotation(-15, 15, getInitialScale(), 0);
        if (currentGuideStep < 5) updateGuide();
    }
</script>
</body>
</html>
